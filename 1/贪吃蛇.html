<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> <title>                                                          					</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; } body { font-family: 'Courier New', Courier, monospace; background-color: #fff; color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; overflow: auto; width: 100%; position: relative; } .container { max-width: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; } .header { text-align: center; margin-bottom: 5px; width: 100%; } h1 { font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 1px; } .game-info { display: flex; justify-content: space-between; width: 100%; max-width: 400px; font-size: 1rem; font-weight: bold; } .game-board { position: relative; background-color: white; border: 2px solid #000; line-height: 1; width: 100%; max-width: 400px; display: flex; justify-content: center; align-items: center; } #game-canvas { display: block; width: 100%; height: auto; image-rendering: crisp-edges; image-rendering: pixelated; background-color: #fff; } .controls { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; max-width: 400px; margin-top: 20px; } .directional-controls { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; width: 250px; height: 250px; margin: 0 auto; } .control-btn { background-color: #f0f0f0; border: 2px solid #000; border-radius: 12px; font-size: 2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: all 0.05s linear; touch-action: manipulation; -webkit-user-select: none; -webkit-tap-highlight-color: rgba(0,0,0,0.1); } .control-btn:active { background-color: #d0d0d0; transform: scale(0.96); } .up-btn { grid-column: 2; grid-row: 1; } .left-btn { grid-column: 1; grid-row: 2; } .right-btn { grid-column: 3; grid-row: 2; } .down-btn { grid-column: 2; grid-row: 3; } .action-controls { display: flex; gap: 12px; width: 100%; justify-content: center; } .action-btn { background-color: #f0f0f0; border: 2px solid #000; border-radius: 12px; padding: 12px 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; user-select: none; transition: all 0.05s linear; flex: 1; max-width: 150px; text-align: center; touch-action: manipulation; } .action-btn:active { background-color: #d0d0d0; transform: scale(0.97); } .start-btn { background-color: #e0ffe0; } .pause-btn { background-color: #ffffe0; } .instructions { text-align: center; max-width: 400px; line-height: 1.4; margin-top: 5px; font-size: 0.8rem; color: #333; } .game-over { position: absolute; display: none; z-index: 20; background: transparent; pointer-events: auto; justify-content: center; align-items: center; flex-direction: column; } .game-over h2 { font-size: 2rem; margin-bottom: 15px; color: #000; } .game-over p { font-size: 1.2rem; margin-bottom: 15px; } .restart-btn { background-color: #f0f0f0; border: 2px solid #000; border-radius: 12px; padding: 12px 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer; user-select: none; transition: all 0.05s linear; } .restart-btn:active { background-color: #d0d0d0; transform: scale(0.96); } @media (max-width: 500px) { .directional-controls { width: 260px; height: 260px; gap: 12px; } .control-btn { font-size: 1.8rem; } .action-btn { padding: 10px 8px; font-size: 1rem; } } @media (max-height: 700px) { h1 { font-size: 1.2rem; margin-bottom: 10px; } .game-info { font-size: 0.9rem; } .directional-controls { width: 180px; height: 180px; gap: 10px; } .control-btn { font-size: 1.4rem; } .controls { gap: 15px; } } @media (max-height: 600px) { .container { gap: 5px; } h1 { font-size: 1rem; margin-bottom: 2px; } .directional-controls { width: 140px; height: 140px; } .instructions { display: none; } } @media (orientation: landscape) and (max-height: 500px) { body { padding: 5px; overflow-y: auto; } .container { flex-direction: row; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; } .header { flex: 0 0 auto; margin-bottom: 0; padding-right: 10px; } .game-board { max-width: 45vh; flex-shrink: 0; } .controls { flex: 0 0 auto; max-width: 260px; margin-top: 0; } .directional-controls { width: 160px; height: 160px; gap: 8px; } .instructions { display: block; font-size: 0.65rem; } h1 { font-size: 1rem; } } </style> </head> <body> <div class="container"> <div class="header"> <div class="game-info"> <div class="score">得分: <span id="score">0</span></div> <div class="level">等级: <span id="level">1</span></div> <div class="high-score">最高分: <span id="high-score">0</span></div> </div> </div> <div class="game-board"> <canvas id="game-canvas"></canvas> <div class="game-over" id="game-over"> <h2>游戏结束</h2> <p>得分: <span id="final-score">0</span></p> <button class="restart-btn" id="restart-btn">重新开始</button> </div> </div> <div class="controls"> <div class="directional-controls"> <button class="control-btn up-btn" id="up-btn">↑</button> <button class="control-btn left-btn" id="left-btn">←</button> <button class="control-btn right-btn" id="right-btn">→</button> <button class="control-btn down-btn" id="down-btn">↓</button> </div> <div class="action-controls"> <button class="action-btn start-btn" id="start-btn">开始游戏</button> <button class="action-btn pause-btn" id="pause-btn">暂停游戏</button> </div> </div> </div> <script> const config = { boardWidth: 19, boardHeight: 15, initialSpeed: 200, speedIncrement: 5, foodChars: ['%'], snakeHeadChar: 'O', snakeBodyChar: '*', borderChar: 'X' }; let gameState = { score: 0, level: 1, highScore: 0, isRunning: false, isPaused: false, gameOver: false, direction: 'right', nextDirection: 'right', speed: config.initialSpeed, lastUpdateTime: 0, snake: [], food: {x: 0, y: 0, char: '%'}, cellSize: 20, canvasWidth: 0, canvasHeight: 0, animationId: null, logicWidth: 0, logicHeight: 0, devicePixelRatio: 1 }; const canvas = document.getElementById('game-canvas'); const ctx = canvas.getContext('2d'); const scoreElement = document.getElementById('score'); const levelElement = document.getElementById('level'); const highScoreElement = document.getElementById('high-score'); const finalScoreElement = document.getElementById('final-score'); const gameOverElement = document.getElementById('game-over'); const startBtn = document.getElementById('start-btn'); const pauseBtn = document.getElementById('pause-btn'); const restartBtn = document.getElementById('restart-btn'); const upBtn = document.getElementById('up-btn'); const leftBtn = document.getElementById('left-btn'); const rightBtn = document.getElementById('right-btn'); const downBtn = document.getElementById('down-btn'); try { let stored = localStorage.getItem('snakeHighScore'); if (stored !== null && !isNaN(parseInt(stored))) { gameState.highScore = parseInt(stored); } else { gameState.highScore = 0; } } catch(e) { gameState.highScore = 0; } highScoreElement.textContent = gameState.highScore; function stopAnimation() { if (gameState.animationId) { cancelAnimationFrame(gameState.animationId); gameState.animationId = null; } } function startAnimation() { if (gameState.animationId) stopAnimation(); gameState.animationId = requestAnimationFrame(updateGame); } function calculateCellSize() { const boardElem = document.querySelector('.game-board'); let maxWidth = boardElem.clientWidth - 4; if (maxWidth <= 0) maxWidth = window.innerWidth - 40; const boardCellsW = config.boardWidth + 2; const boardCellsH = config.boardHeight + 2; let sizeByWidth = Math.floor(maxWidth / boardCellsW); const maxHeight = window.innerHeight * 0.6; let sizeByHeight = Math.floor(maxHeight / boardCellsH); let newSize = Math.min(sizeByWidth, sizeByHeight); newSize = Math.min(44, Math.max(16, newSize)); gameState.cellSize = newSize; return newSize; } function resizeCanvas() { calculateCellSize(); const logicW = (config.boardWidth + 2) * gameState.cellSize; const logicH = (config.boardHeight + 2) * gameState.cellSize; gameState.logicWidth = logicW; gameState.logicHeight = logicH; const dpr = window.devicePixelRatio || 1; gameState.devicePixelRatio = dpr; canvas.width = logicW * dpr; canvas.height = logicH * dpr; canvas.style.width = `${logicW}px`; canvas.style.height = `${logicH}px`; ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr); gameState.canvasWidth = logicW; gameState.canvasHeight = logicH; drawGame(); } function drawGame() { if (!ctx) return; ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(gameState.devicePixelRatio, gameState.devicePixelRatio); ctx.clearRect(0, 0, gameState.logicWidth, gameState.logicHeight); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, gameState.logicWidth, gameState.logicHeight); const cell = gameState.cellSize; const fontSize = Math.max(14, Math.floor(cell * 0.85)); ctx.font = `${fontSize}px 'Courier New', Courier, monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#000000'; const cols = config.boardWidth + 2; const rows = config.boardHeight + 2; for (let x = 0; x < cols; x++) { ctx.fillText(config.borderChar, x * cell + cell/2, cell/2); ctx.fillText(config.borderChar, x * cell + cell/2, (rows-1) * cell + cell/2); } for (let y = 1; y < rows-1; y++) { ctx.fillText(config.borderChar, cell/2, y * cell + cell/2); ctx.fillText(config.borderChar, (cols-1) * cell + cell/2, y * cell + cell/2); } if (gameState.snake && gameState.snake.length) { for (let i = 0; i < gameState.snake.length; i++) { const seg = gameState.snake[i]; const char = i === 0 ? config.snakeHeadChar : config.snakeBodyChar; ctx.fillText(char, seg.x * cell + cell/2, seg.y * cell + cell/2); } } if (gameState.food && gameState.food.x) { ctx.fillText(gameState.food.char, gameState.food.x * cell + cell/2, gameState.food.y * cell + cell/2); } ctx.restore(); } function placeFood() { const empty = []; for (let y = 1; y <= config.boardHeight; y++) { for (let x = 1; x <= config.boardWidth; x++) { let occupied = gameState.snake.some(s => s.x === x && s.y === y); if (!occupied) empty.push({x, y}); } } if (empty.length === 0) { endGame(); return false; } const pos = empty[Math.floor(Math.random() * empty.length)]; gameState.food = {x: pos.x, y: pos.y, char: config.foodChars[0]}; return true; } function updateUI() { scoreElement.textContent = gameState.score; levelElement.textContent = gameState.level; if (gameState.score > gameState.highScore) { gameState.highScore = gameState.score; try { localStorage.setItem('snakeHighScore', gameState.highScore); } catch(e) {} highScoreElement.textContent = gameState.highScore; } else { highScoreElement.textContent = gameState.highScore; } if (gameState.gameOver) { startBtn.textContent = '开始游戏'; pauseBtn.textContent = '暂停游戏'; } else if (gameState.isRunning && !gameState.isPaused) { startBtn.textContent = '重新开始'; pauseBtn.textContent = '暂停游戏'; } else if (gameState.isRunning && gameState.isPaused) { startBtn.textContent = '重新开始'; pauseBtn.textContent = '继续游戏'; } else { startBtn.textContent = '开始游戏'; pauseBtn.textContent = '暂停游戏'; } } function endGame() { if (gameState.gameOver) return; gameState.isRunning = false; gameState.gameOver = true; gameState.isPaused = false; if (gameState.score > gameState.highScore) { gameState.highScore = gameState.score; try { localStorage.setItem('snakeHighScore', gameState.highScore); } catch(e) {} highScoreElement.textContent = gameState.highScore; } finalScoreElement.textContent = gameState.score; gameOverElement.style.display = 'flex'; updateUI(); drawGame(); stopAnimation(); } function resetGameData() { gameState.score = 0; gameState.level = 1; gameState.direction = 'right'; gameState.nextDirection = 'right'; gameState.speed = config.initialSpeed; gameState.isRunning = false; gameState.isPaused = false; gameState.gameOver = false; gameState.lastUpdateTime = 0; const startX = Math.floor(config.boardWidth/2) + 1; const startY = Math.floor(config.boardHeight/2) + 1; gameState.snake = [ {x: startX, y: startY}, {x: startX-1, y: startY}, {x: startX-2, y: startY} ]; placeFood(); updateUI(); drawGame(); gameOverElement.style.display = 'none'; } function startGame() { stopAnimation(); resetGameData(); gameState.isRunning = true; gameState.isPaused = false; gameState.gameOver = false; gameState.lastUpdateTime = 0; updateUI(); drawGame(); startAnimation(); } function togglePause() { if (!gameState.isRunning || gameState.gameOver) return; gameState.isPaused = !gameState.isPaused; updateUI(); if (!gameState.isPaused) { gameState.lastUpdateTime = 0; startAnimation(); } } function changeDirection(newDir) { if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) return; const curr = gameState.direction; if ((newDir === 'up' && curr === 'down') || (newDir === 'down' && curr === 'up') || (newDir === 'left' && curr === 'right') || (newDir === 'right' && curr === 'left')) { return; } gameState.nextDirection = newDir; } function updateGame(now) { if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) { if (gameState.gameOver) { drawGame(); } gameState.animationId = requestAnimationFrame(updateGame); return; } if (now - gameState.lastUpdateTime >= gameState.speed) { gameState.lastUpdateTime = now; gameState.direction = gameState.nextDirection; const head = {...gameState.snake[0]}; switch(gameState.direction) { case 'up': head.y--; break; case 'down': head.y++; break; case 'left': head.x--; break; case 'right': head.x++; break; } if (head.x <= 0 || head.x >= config.boardWidth+1 || head.y <= 0 || head.y >= config.boardHeight+1) { endGame(); gameState.animationId = requestAnimationFrame(updateGame); return; } let selfCollision = false; for (let i = 0; i < gameState.snake.length; i++) { if (gameState.snake[i].x === head.x && gameState.snake[i].y === head.y) { selfCollision = true; break; } } if (selfCollision) { endGame(); gameState.animationId = requestAnimationFrame(updateGame); return; } gameState.snake.unshift(head); const ate = (head.x === gameState.food.x && head.y === gameState.food.y); if (ate) { gameState.score += 10; const newLv = Math.floor(gameState.score / 50) + 1; if (newLv > gameState.level) { gameState.level = newLv; let newSpeed = config.initialSpeed - (gameState.level-1) * config.speedIncrement; gameState.speed = Math.max(50, newSpeed); } if (!placeFood()) { gameState.animationId = requestAnimationFrame(updateGame); updateUI(); drawGame(); return; } } else { gameState.snake.pop(); } updateUI(); drawGame(); } gameState.animationId = requestAnimationFrame(updateGame); } function addButtonHandler(btn, handler) { if (!btn) return; const wrapped = (e) => { e.preventDefault(); handler(); }; btn.addEventListener('click', wrapped); btn.addEventListener('touchstart', wrapped, { passive: false }); } addButtonHandler(startBtn, startGame); addButtonHandler(pauseBtn, togglePause); addButtonHandler(restartBtn, startGame); addButtonHandler(upBtn, () => changeDirection('up')); addButtonHandler(leftBtn, () => changeDirection('left')); addButtonHandler(rightBtn, () => changeDirection('right')); addButtonHandler(downBtn, () => changeDirection('down')); document.addEventListener('keydown', (e) => { if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) return; let key = e.key; if (key === 'ArrowUp' || key === 'w' || key === 'W') { e.preventDefault(); changeDirection('up'); } else if (key === 'ArrowDown' || key === 's' || key === 'S') { e.preventDefault(); changeDirection('down'); } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') { e.preventDefault(); changeDirection('left'); } else if (key === 'ArrowRight' || key === 'd' || key === 'D') { e.preventDefault(); changeDirection('right'); } else if (key === ' ' || key === 'Space') { e.preventDefault(); togglePause(); } }); let touchStart = {x: 0, y: 0}; canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const rect = canvas.getBoundingClientRect(); const touch = e.touches[0]; touchStart.x = touch.clientX - rect.left; touchStart.y = touch.clientY - rect.top; }, { passive: false }); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false }); canvas.addEventListener('touchend', (e) => { e.preventDefault(); if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) return; const rect = canvas.getBoundingClientRect(); const endX = e.changedTouches[0].clientX - rect.left; const endY = e.changedTouches[0].clientY - rect.top; const dx = endX - touchStart.x; const dy = endY - touchStart.y; if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return; if (Math.abs(dx) > Math.abs(dy)) { if (dx > 0) changeDirection('right'); else changeDirection('left'); } else { if (dy > 0) changeDirection('down'); else changeDirection('up'); } }, { passive: false }); const preventScrollElements = ['.directional-controls', '.action-controls', '.game-board']; document.querySelectorAll('.control-btn, .action-btn, .game-board').forEach(el => { el.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false }); el.addEventListener('touchstart', (e) => { }, { passive: false }); }); let resizeTimer; window.addEventListener('resize', () => { if (resizeTimer) clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { const wasRunning = gameState.isRunning; const wasPaused = gameState.isPaused; if (wasRunning && !wasPaused && !gameState.gameOver) { stopAnimation(); } resizeCanvas(); if (wasRunning && !wasPaused && !gameState.gameOver) { startAnimation(); } drawGame(); }, 100); }); function initialSetup() { resizeCanvas(); resetGameData(); drawGame(); } initialSetup(); window.addEventListener('orientationchange', () => { setTimeout(() => { resizeCanvas(); drawGame(); }, 30); }); </script> </body> </html>
