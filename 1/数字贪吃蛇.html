<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> <title>                                                          					</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; } body { font-family: 'Courier New', Courier, monospace; background-color: #fff; color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; overflow: hidden; width: 100%; } .container { max-width: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; } .header { text-align: center; margin-bottom: 5px; width: 100%; } h1 { font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 1px; } .game-info { display: flex; justify-content: space-between; width: 100%; max-width: 400px; font-size: 1rem; font-weight: bold; } .game-board { position: relative; background-color: white; border: 2px solid #000; line-height: 1; width: 100%; max-width: 400px; overflow: hidden; } #game-canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; } .controls { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; max-width: 400px; margin-top: 20px; } .directional-controls { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; width: 300px; height: 300px; margin: 0 auto; } .control-btn { background-color: #f0f0f0; border: 2px solid #000; border-radius: 8px; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: all 0.1s; touch-action: manipulation; -webkit-user-select: none; } .control-btn:active { background-color: #d0d0d0; transform: scale(0.95); } .up-btn { grid-column: 2; grid-row: 1; } .left-btn { grid-column: 1; grid-row: 2; } .right-btn { grid-column: 3; grid-row: 2; } .down-btn { grid-column: 2; grid-row: 3; } .action-controls { display: flex; gap: 10px; width: 100%; justify-content: center; } .action-btn { background-color: #f0f0f0; border: 2px solid #000; border-radius: 8px; padding: 10px 15px; font-size: 1rem; font-weight: bold; cursor: pointer; user-select: none; transition: all 0.1s; flex: 1; max-width: 150px; touch-action: manipulation; } .action-btn:active { background-color: #d0d0d0; transform: scale(0.95); } .start-btn { background-color: #e0ffe0; } .pause-btn { background-color: #ffffe0; } .instructions { text-align: center; max-width: 400px; line-height: 1.4; margin-top: 5px; font-size: 0.8rem; color: #333; } .game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; } .game-over h2 { font-size: 2rem; margin-bottom: 15px; color: #000; } .game-over p { font-size: 1.2rem; margin-bottom: 15px; } .restart-btn { background-color: #f0f0f0; border: 2px solid #000; border-radius: 8px; padding: 12px 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer; user-select: none; transition: all 0.1s; } .restart-btn:active { background-color: #d0d0d0; transform: scale(0.95); } .keyboard-controls { font-size: 0.7rem; margin-top: 3px; color: #666; } @media (max-height: 700px) { h1 { font-size: 1.2rem; } .game-info { font-size: 0.9rem; } .directional-controls { width: 130px; height: 130px; } .control-btn { font-size: 1.3rem; } } @media (max-height: 600px) { .container { gap: 5px; } h1 { font-size: 1rem; margin-bottom: 2px; } .directional-controls { width: 120px; height: 120px; } .instructions { display: none; } } @media (orientation: landscape) and (max-height: 500px) { body { padding: 5px; } .container { flex-direction: row; justify-content: space-between; align-items: flex-start; max-width: 100%; height: 100vh; } .header { flex: 1; margin-bottom: 0; padding-right: 10px; } .game-board { max-width: 50vh; height: 90vh; } .controls { flex: 1; max-width: 40%; margin-top: 0; } .instructions { display: block; font-size: 0.7rem; } } </style> </head> <body> <div class="container"> <div class="header"> <h1>数字贪吃蛇</h1> <div class="game-info"> <div class="score">得分: <span id="score">0</span></div> <div class="level">等级: <span id="level">1</span></div> <div class="high-score">最高分: <span id="high-score">0</span></div> </div> </div> <div class="game-board"> <canvas id="game-canvas"></canvas> <div class="game-over" id="game-over"> <h2>游戏结束</h2> <p>得分: <span id="final-score">0</span></p> <button class="restart-btn" id="restart-btn">重新开始</button> </div> </div> <div class="controls"> <div class="directional-controls"> <button class="control-btn up-btn" id="up-btn">↑</button> <button class="control-btn left-btn" id="left-btn">←</button> <button class="control-btn right-btn" id="right-btn">→</button> <button class="control-btn down-btn" id="down-btn">↓</button> </div> <div class="action-controls"> <button class="action-btn start-btn" id="start-btn">开始游戏</button> <button class="action-btn pause-btn" id="pause-btn">暂停游戏</button> </div> <div class="instructions"> 使用方向键或屏幕按钮控制贪吃蛇移动<br> <span class="keyboard-controls"></span> </div> </div> </div> <script> const config = { boardWidth: 20, boardHeight: 15, initialSpeed: 200, speedIncrement: 5, foodChars: ['%'], snakeHeadChar: 'O', snakeBodyChar: '*', borderChar: 'X' }; let gameState = { score: 0, level: 1, highScore: localStorage.getItem('snakeHighScore') || 0, isRunning: false, isPaused: false, gameOver: false, direction: 'right', nextDirection: 'right', speed: config.initialSpeed, lastUpdateTime: 0, snake: [], food: {x: 0, y: 0, char: '%'}, cellSize: 20, canvasWidth: 0, canvasHeight: 0 }; const canvas = document.getElementById('game-canvas'); const ctx = canvas.getContext('2d'); const scoreElement = document.getElementById('score'); const levelElement = document.getElementById('level'); const highScoreElement = document.getElementById('high-score'); const finalScoreElement = document.getElementById('final-score'); const gameOverElement = document.getElementById('game-over'); const startBtn = document.getElementById('start-btn'); const pauseBtn = document.getElementById('pause-btn'); const restartBtn = document.getElementById('restart-btn'); const upBtn = document.getElementById('up-btn'); const leftBtn = document.getElementById('left-btn'); const rightBtn = document.getElementById('right-btn'); const downBtn = document.getElementById('down-btn'); function initGame() { calculateCellSize(); const boardWidth = config.boardWidth + 2; const boardHeight = config.boardHeight + 2; canvas.width = boardWidth * gameState.cellSize; canvas.height = boardHeight * gameState.cellSize; gameState.canvasWidth = canvas.width; gameState.canvasHeight = canvas.height; gameState.score = 0; gameState.level = 1; gameState.isRunning = false; gameState.isPaused = false; gameState.gameOver = false; gameState.direction = 'right'; gameState.nextDirection = 'right'; gameState.speed = config.initialSpeed; gameState.snake = [ {x: Math.floor(config.boardWidth/2) + 1, y: Math.floor(config.boardHeight/2) + 1}, {x: Math.floor(config.boardWidth/2), y: Math.floor(config.boardHeight/2) + 1}, {x: Math.floor(config.boardWidth/2) - 1, y: Math.floor(config.boardHeight/2) + 1} ]; placeFood(); updateUI(); drawGame(); gameOverElement.style.display = 'none'; } function calculateCellSize() { const boardWidth = config.boardWidth + 2; const boardHeight = config.boardHeight + 2; const container = document.querySelector('.game-board'); const containerWidth = container.clientWidth; const containerHeight = container.clientHeight || window.innerHeight * 0.4; const maxCellSizeByWidth = Math.floor(containerWidth / boardWidth); const maxCellSizeByHeight = Math.floor(containerHeight / boardHeight); const maxCellSize = Math.min(maxCellSizeByWidth, maxCellSizeByHeight); gameState.cellSize = Math.max(15, Math.min(30, maxCellSize)); } function placeFood() { let emptyCells = []; for (let y = 1; y <= config.boardHeight; y++) { for (let x = 1; x <= config.boardWidth; x++) { let isOccupied = gameState.snake.some(segment => segment.x === x && segment.y === y); if (!isOccupied) { emptyCells.push({x, y}); } } } if (emptyCells.length > 0) { const randomIndex = Math.floor(Math.random() * emptyCells.length); const {x, y} = emptyCells[randomIndex]; gameState.food = {x, y, char: config.foodChars[0]}; } } function drawGame() { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.font = `${gameState.cellSize}px 'Courier New', monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#000'; const boardWidth = config.boardWidth + 2; const boardHeight = config.boardHeight + 2; for (let x = 0; x < boardWidth; x++) { ctx.fillText( config.borderChar, x * gameState.cellSize + gameState.cellSize/2, gameState.cellSize/2 ); } for (let x = 0; x < boardWidth; x++) { ctx.fillText( config.borderChar, x * gameState.cellSize + gameState.cellSize/2, (boardHeight - 1) * gameState.cellSize + gameState.cellSize/2 ); } for (let y = 1; y < boardHeight - 1; y++) { ctx.fillText( config.borderChar, gameState.cellSize/2, y * gameState.cellSize + gameState.cellSize/2 ); } for (let y = 1; y < boardHeight - 1; y++) { ctx.fillText( config.borderChar, (boardWidth - 1) * gameState.cellSize + gameState.cellSize/2, y * gameState.cellSize + gameState.cellSize/2 ); } for (let i = 0; i < gameState.snake.length; i++) { const segment = gameState.snake[i]; const char = i === 0 ? config.snakeHeadChar : config.snakeBodyChar; ctx.fillStyle = '#000'; ctx.fillText( char, segment.x * gameState.cellSize + gameState.cellSize/2, segment.y * gameState.cellSize + gameState.cellSize/2 ); } ctx.fillStyle = '#000'; ctx.fillText( gameState.food.char, gameState.food.x * gameState.cellSize + gameState.cellSize/2, gameState.food.y * gameState.cellSize + gameState.cellSize/2 ); } function updateGame(timestamp) { if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) { requestAnimationFrame(updateGame); return; } if (timestamp - gameState.lastUpdateTime < gameState.speed) { requestAnimationFrame(updateGame); return; } gameState.lastUpdateTime = timestamp; gameState.direction = gameState.nextDirection; const head = {...gameState.snake[0]}; switch (gameState.direction) { case 'up': head.y--; break; case 'down': head.y++; break; case 'left': head.x--; break; case 'right': head.x++; break; } if (head.x <= 0 || head.x >= config.boardWidth + 1 || head.y <= 0 || head.y >= config.boardHeight + 1) { endGame(); return; } for (let i = 0; i < gameState.snake.length; i++) { if (gameState.snake[i].x === head.x && gameState.snake[i].y === head.y) { endGame(); return; } } gameState.snake.unshift(head); if (head.x === gameState.food.x && head.y === gameState.food.y) { gameState.score += 10; const newLevel = Math.floor(gameState.score / 50) + 1; if (newLevel > gameState.level) { gameState.level = newLevel; gameState.speed = Math.max(50, config.initialSpeed - (gameState.level - 1) * config.speedIncrement); } placeFood(); } else { gameState.snake.pop(); } updateUI(); drawGame(); requestAnimationFrame(updateGame); } function updateUI() { scoreElement.textContent = gameState.score; levelElement.textContent = gameState.level; highScoreElement.textContent = gameState.highScore; if (gameState.isRunning && !gameState.isPaused) { startBtn.textContent = '重新开始'; pauseBtn.textContent = '暂停游戏'; } else if (gameState.isRunning && gameState.isPaused) { pauseBtn.textContent = '继续游戏'; } else { startBtn.textContent = '开始游戏'; pauseBtn.textContent = '暂停游戏'; } } function startGame() { if (gameState.gameOver) { initGame(); } gameState.isRunning = true; gameState.isPaused = false; gameState.gameOver = false; gameState.lastUpdateTime = 0; updateUI(); requestAnimationFrame(updateGame); } function togglePause() { if (!gameState.isRunning || gameState.gameOver) return; gameState.isPaused = !gameState.isPaused; updateUI(); if (!gameState.isPaused) { gameState.lastUpdateTime = 0; requestAnimationFrame(updateGame); } } function endGame() { gameState.isRunning = false; gameState.gameOver = true; if (gameState.score > gameState.highScore) { gameState.highScore = gameState.score; localStorage.setItem('snakeHighScore', gameState.highScore); } finalScoreElement.textContent = gameState.score; gameOverElement.style.display = 'flex'; updateUI(); } function changeDirection(newDirection) { if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) return; if ( (newDirection === 'up' && gameState.direction !== 'down') || (newDirection === 'down' && gameState.direction !== 'up') || (newDirection === 'left' && gameState.direction !== 'right') || (newDirection === 'right' && gameState.direction !== 'left') ) { gameState.nextDirection = newDirection; } } startBtn.addEventListener('click', startGame); pauseBtn.addEventListener('click', togglePause); restartBtn.addEventListener('click', startGame); upBtn.addEventListener('click', () => changeDirection('up')); leftBtn.addEventListener('click', () => changeDirection('left')); rightBtn.addEventListener('click', () => changeDirection('right')); downBtn.addEventListener('click', () => changeDirection('down')); document.addEventListener('keydown', (e) => { if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) return; switch(e.key) { case 'ArrowUp': case 'w': case 'W': e.preventDefault(); changeDirection('up'); break; case 'ArrowDown': case 's': case 'S': e.preventDefault(); changeDirection('down'); break; case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); changeDirection('left'); break; case 'ArrowRight': case 'd': case 'D': e.preventDefault(); changeDirection('right'); break; case ' ': case 'Spacebar': e.preventDefault(); togglePause(); break; } }); let touchStartX = 0; let touchStartY = 0; let touchEndX = 0; let touchEndY = 0; canvas.addEventListener('touchstart', (e) => { e.preventDefault(); touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: false }); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false }); canvas.addEventListener('touchend', (e) => { e.preventDefault(); if (!gameState.isRunning || gameState.isPaused || gameState.gameOver) return; touchEndX = e.changedTouches[0].clientX; touchEndY = e.changedTouches[0].clientY; const dx = touchEndX - touchStartX; const dy = touchEndY - touchStartY; if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return; if (Math.abs(dx) > Math.abs(dy)) { if (dx > 0) { changeDirection('right'); } else { changeDirection('left'); } } else { if (dy > 0) { changeDirection('down'); } else { changeDirection('up'); } } }, { passive: false }); document.addEventListener('gesturestart', (e) => { e.preventDefault(); }); document.addEventListener('gesturechange', (e) => { e.preventDefault(); }); document.addEventListener('gestureend', (e) => { e.preventDefault(); }); initGame(); window.addEventListener('resize', () => { calculateCellSize(); const boardWidth = config.boardWidth + 2; const boardHeight = config.boardHeight + 2; canvas.width = boardWidth * gameState.cellSize; canvas.height = boardHeight * gameState.cellSize; gameState.canvasWidth = canvas.width; gameState.canvasHeight = canvas.height; drawGame(); }); document.body.addEventListener('touchmove', (e) => { if (e.target === canvas || e.target.closest('.controls')) { e.preventDefault(); } }, { passive: false }); window.addEventListener('load', () => { setTimeout(() => { calculateCellSize(); const boardWidth = config.boardWidth + 2; const boardHeight = config.boardHeight + 2; canvas.width = boardWidth * gameState.cellSize; canvas.height = boardHeight * gameState.cellSize; gameState.canvasWidth = canvas.width; gameState.canvasHeight = canvas.height; drawGame(); }, 100); }); </script> </body> </html>
