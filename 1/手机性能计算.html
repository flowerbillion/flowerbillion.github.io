<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            background-color: #f5f7fa;
        }
        body {
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        iframe {
            width: 50%;
            height: 500px;
            border: none;
            display: block;
            -webkit-overflow-scrolling: touch;
            transition: width 0.2s ease;
            margin: 0 auto;
            overflow: auto;
            box-sizing: border-box;
        }
        @media screen and (max-width: 768px) {
            iframe {
                width: 100% !important;
                height: 500px;
                margin: 0;
                border-radius: 0;
            }
        }
        @media screen and (max-width: 480px) {
            iframe {
                height: 500px;
                min-height: 420px;
            }
        }
        @media screen and (orientation: landscape) and (max-width: 896px) {
            iframe {
                height: calc(100vh - 20px);
                max-height: 550px;
            }
        }
        @media screen and (min-width: 768px) and (max-width: 1024px) {
            iframe {
                width: 75%;
            }
        }
        iframe {
            max-width: 100%;
        }
        .loading-placeholder {
            display: none;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>
    <!-- 
        方法1：通过 sandbox 限制 iframe 跳转
        - 只保留 allow-same-origin 和 allow-scripts，移除 allow-popups、allow-forms、allow-modals 等。
        - 这样可以禁止 iframe 内的链接跳转、表单提交、新窗口打开等任何导航行为。
        - 如果 iframe 内脚本需要访问 localStorage 或同源资源，allow-same-origin 是必要的。
    -->
    <iframe 
        src="性能计算.html" 
        width="50%" 
        height="500px" 
        loading="lazy"
        referrerpolicy="origin"
        sandbox="allow-same-origin allow-scripts"
        style="border:0;">
    </iframe>
    <script>
        (function() {
            if ('ResizeObserver' in window) {
                const observer = new ResizeObserver(function(entries) {
                    // 仅用于监听 body 尺寸变化（原代码留空）
                });
                observer.observe(document.body);
            }
            const frame = document.querySelector('iframe');
            if (frame && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                frame.style.touchAction = 'pan-y pinch-zoom';
                frame.style.webkitOverflowScrolling = 'touch';
            }
        })();
    </script>
</body>
</html>
