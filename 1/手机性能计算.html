<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>手机性能评估工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            background-color: #f5f7fa;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        iframe {
            width: 50%;
            height: 500px;
            border: none;
            display: block;
            -webkit-overflow-scrolling: touch;
            transition: width 0.2s ease;
            margin: 0 auto;
            overflow: auto;
            box-sizing: border-box;
        }

        @media screen and (max-width: 768px) {
            iframe {
                width: 100% !important;
                height: 500px;
                margin: 0;
                border-radius: 0;
            }
        }

        @media screen and (max-width: 480px) {
            iframe {
                height: 500px;
                min-height: 420px;
            }
        }

        @media screen and (orientation: landscape) and (max-width: 896px) {
            iframe {
                height: calc(100vh - 20px);
                max-height: 550px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) {
            iframe {
                width: 75%;
            }
        }

        iframe {
            max-width: 100%;
        }

        .loading-placeholder {
            display: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>
    <span class="sr-only">手机性能计算工具，下方为详细评估面板，支持触摸滚动操作</span>

    <iframe 
        src="性能计算.html" 
        width="50%" 
        height="500px" 
        title="手机性能基准测试与计算工具"
        loading="lazy"
        referrerpolicy="origin"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"
        style="border:0;"
    >
        <p>抱歉，您的浏览器无法嵌入此计算工具。请升级浏览器或<a href="性能计算.html">点击直接访问</a>手机性能计算页面。</p>
    </iframe>

    <div style="text-align: center; font-size: 12px; color: #6c757d; margin: 12px 16px; line-height: 1.4; background: transparent;">
        <span style="background: rgba(255,255,240,0.7); padding: 4px 12px; border-radius: 20px; backdrop-filter: blur(2px);">双指缩放可查看更多细节</span>
    </div>

    <script>
        (function() {
            if ('ResizeObserver' in window) {
                const observer = new ResizeObserver(function(entries) {
                    for (let entry of entries) {
                        if (entry.target === document.body) {
                        }
                    }
                });
                observer.observe(document.body);
            }
            const frame = document.querySelector('iframe');
            if (frame && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                frame.style.touchAction = 'pan-y pinch-zoom';
                frame.style.webkitOverflowScrolling = 'touch';
            }
        })();
    </script>
</body>
</html>
