<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        iframe {
            display: block;
            width: 100%;
            aspect-ratio: 2 / 1;
            border: none;
            background: #f5f5f5;
        }
        @media (max-width: 480px) {
            iframe {
                aspect-ratio: 2 / 1;
            }
        }
    </style>
</head>
<body>
    <iframe src="性能计算" title="性能计算工具"></iframe>
</body>
</html>
