<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes"><title>工具</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;background-color:#f5f7fa}body{min-height:100vh;overflow-x:hidden;padding:0;margin:0;-webkit-font-smoothing:antialiased;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}iframe{width:50%;height:500px;border:none;display:block;-webkit-overflow-scrolling:touch;transition:width .2s ease;margin:0 auto;overflow:auto;box-sizing:border-box}@media (max-width:768px){iframe{width:100%!important;height:500px;margin:0;border-radius:0}}@media (max-width:480px){iframe{height:500px;min-height:420px}}@media (orientation:landscape) and (max-width:896px){iframe{height:calc(100vh - 20px);max-height:550px}}@media (min-width:768px) and (max-width:1024px){iframe{width:75%}}iframe{max-width:100%}.loading-placeholder{display:none}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}</style></head><body><iframe src="性能计算" width="50%" height="500px" loading="lazy" referrerpolicy="origin" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" style="border:0;"></iframe><script>(function(){if('ResizeObserver' in window){const observer=new ResizeObserver(function(entries){});observer.observe(document.body);}const frame=document.querySelector('iframe');if(frame&&/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)){frame.style.touchAction='pan-y pinch-zoom';}})();</script></body></html>
